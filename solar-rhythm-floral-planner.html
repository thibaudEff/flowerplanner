    // Pexels photo IDs for each flower — loaded at runtime in user's browser
    const FLOWER_PHOTO_IDS = {

      anthurium: 13964909, peony: 14415002, dahlia: 5811883,
      ranunculus: 8483711, clematis: 117689, calla: 33935829,

    };

    // Global image cache to avoid re-fetching
    const imageCache = {};

    function usePexelsImage(flowerId) {
      const [src, setSrc] = useState(imageCache[flowerId] || null);
      const [failed, setFailed] = useState(false);
      const attempted = useRef(false);

      useEffect(() => {
        if (src || attempted.current || failed) return;
        attempted.current = true;
        const photoId = FLOWER_PHOTO_IDS[flowerId];
        if (!photoId) { setFailed(true); return; }
        const url = `https://images.pexels.com/photos/${photoId}/pexels-photo-${photoId}.jpeg?auto=compress&cs=tinysrgb&w=280&h=280&fit=crop`;
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          try {
            const c = document.createElement("canvas");
            c.width = 280; c.height = 280;
            const ctx = c.getContext("2d");
            ctx.drawImage(img, 0, 0, 280, 280);
            const dataUrl = c.toDataURL("image/jpeg", 0.85);
            imageCache[flowerId] = dataUrl;
            setSrc(dataUrl);
          } catch(e) {
            // CORS blocked canvas — use the URL directly
            imageCache[flowerId] = url;
            setSrc(url);
          }
        };
        img.onerror = () => {
          // Try without query params
          const fallbackUrl = `https://images.pexels.com/photos/${photoId}/pexels-photo-${photoId}.jpeg`;
          const img2 = new Image();
          img2.onload = () => { imageCache[flowerId] = fallbackUrl; setSrc(fallbackUrl); };
          img2.onerror = () => setFailed(true);
          img2.src = fallbackUrl;
        };
        img.src = url;
      }, [flowerId, src, failed]);

      return { src, failed };
    }

        return (
          <div

            style={{

            {flower?.name?.charAt(0) || "?"}

          style={{ width:size, height:size, objectFit:"cover", borderRadius:radius, flexShrink:0 }}

    };

    const Swatch = ({ hex, size = 28, name, onClick, selected }) => (

        </div>
        <div className="p-4 space-y-3">
          {Object.entries(proposal.elements).map(([key, el]) => {
            const tab = TABS.find(t=>t.id===key);
            return (
              <div key={key} className="border border-stone-100 rounded-xl p-3">
                <div className="flex items-center gap-2 mb-2">
                  <span>{tab?.icon}</span>
                  <span className="font-semibold text-stone-700 text-sm">{tab?.label}</span>
                </div>
                {/* Flower thumbnails row */}
                <div className="flex gap-2 mb-2 flex-wrap items-center">
                  {(el.flowerIds || []).map((fId,i) => (
                    <FlowerImg key={`${fId}-${i}`} flowerId={fId} size={32}/>
                  ))}
                  {key === "tables" && <PassionFruit size={20}/>}
                  <div className="flex gap-0.5 ml-auto">
                    {el.colors.map((c,i) => <Swatch key={i} hex={c} size={16}/>)}
                  </div>
                </div>
                <ul className="text-xs text-stone-600 space-y-0.5">
                  {el.flowers.map((f,i) => <li key={i}>• {f}</li>)}
                </ul>
                <div className="text-xs text-stone-400 mt-1">{el.qty}</div>
              </div>
            );
          })}
          <div className="bg-amber-50 rounded-lg p-3 text-sm text-stone-700 border border-amber-200">
            <strong>Coût estimé:</strong> {proposal.costVsSophie}
          </div>
        </div>
      </div>
    );

    const ExportPanel = ({ proposal, onClose }) => {
      const text = useMemo(() => {
        if (!proposal) return "";
        let lines = [];
        lines.push("═══════════════════════════════════════");
        lines.push(`SOLAR RHYTHM FLORAL PLANNER — ${proposal.name.toUpperCase()}`);
        lines.push("Joana & Thibaud · 26 Juin 2026 · Terre Ugo");
        lines.push("═══════════════════════════════════════\n");
        lines.push(`Philosophie: ${proposal.philosophy}\n`);
        Object.entries(proposal.elements).forEach(([key, el]) => {
          const tab = TABS.find(t=>t.id===key);
          lines.push(`───── ${tab?.icon} ${tab?.label?.toUpperCase()} ─────`);
          lines.push(`Fleurs: ${el.flowers.join(" · ")}`);
          lines.push(`Palette: ${el.colors.join(" ")}`);
          lines.push(`Quantité: ${el.qty}`);
          if (key === "tables") lines.push("+ 2-3 fruits de la passion ouverts par composition");
          lines.push("");
        });
        lines.push("───── BUDGET (vs devis Sophie) ─────");
        lines.push(`${proposal.costVsSophie}`);
        lines.push(`\nTotal devis Sophie: ${SOPHIE_QUOTE.total}€`);
        lines.push(`Acompte 50%: ${SOPHIE_QUOTE.payment1.amount}€ avant ${SOPHIE_QUOTE.payment1.due}`);
        lines.push(`Solde 50%: ${SOPHIE_QUOTE.payment2.amount}€ avant ${SOPHIE_QUOTE.payment2.due}`);
        lines.push("\n───── NOTE POUR SOPHIE ─────");
        lines.push("Fleurissons vos émotions — Sophie");
        lines.push("Photos d'inspiration jointes (dossier FLOWER/)");
        lines.push("Thème: Solar Rhythm — lavande × fruit de la passion");
        lines.push("Contraintes: PAS de roses, PAS de feuillage excessif, PAS boho/rococo");
        return lines.join("\n");
      }, [proposal]);

      if (!proposal) return null;

      return (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="bg-white rounded-2xl max-w-xl w-full max-h-[80vh] overflow-auto p-6" onClick={e=>e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-lg font-bold text-stone-800">Export — {proposal.name}</h2>
              <button onClick={onClose} className="text-stone-400 hover:text-stone-600 text-xl">✕</button>
            </div>
            <pre className="text-xs bg-stone-50 rounded-xl p-4 overflow-auto whitespace-pre-wrap font-mono text-stone-700" style={{maxHeight:400}}>
              {text}
            </pre>
            <button
              onClick={() => { navigator.clipboard?.copyText(text); }}
              className="mt-4 w-full py-3 rounded-xl font-semibold text-white transition-all hover:opacity-90"
              style={{background:"linear-gradient(135deg, #7B68AE, #B0A0C8)"}}
            >
              Copy to clipboard
            </button>
          </div>
        </div>
      );
    };

    /* ─────────────────── MAIN APP ─────────────────── */

    function SolarRhythmFloralPlanner() {
      const [activeTab, setActiveTab] = useState("aisle");
      const [activeMix, setActiveMix] = useState([]);
      const [assignments, setAssignments] = useState({
        aisle:[], altar:[], tables:[], bouquet:[], boutonniere:[], bar:[]
      });
      const [showProposals, setShowProposals] = useState(false);
      const [exportProposal, setExportProposal] = useState(null);
      const [singleFlower, setSingleFlower] = useState(true);
      const [monochrome, setMonochrome] = useState(false);
      const [tropical, setTropical] = useState(false);
      const [provencal, setProvencal] = useState(true);
      const [sidebar, setSidebar] = useState(true);
      const [fullView, setFullView] = useState(false);

      const toggleColor = useCallback((hex) => {
        setActiveMix(prev => prev.includes(hex) ? prev.filter(c=>c!==hex) : [...prev, hex]);
      }, []);

      const assignFlower = useCallback((flowerId) => {
        setAssignments(prev => {
          const curr = prev[activeTab] || [];
          if (activeTab === "bouquet" && singleFlower) {
            if (curr.includes(flowerId)) return { ...prev, [activeTab]: [] };
            return { ...prev, [activeTab]: [flowerId] };
          }
          if (curr.includes(flowerId)) return { ...prev, [activeTab]: curr.filter(f=>f!==flowerId) };
          return { ...prev, [activeTab]: [...curr, flowerId] };
        });
      }, [activeTab, singleFlower]);

      const handleDrop = useCallback((e) => {
        e.preventDefault();
        const flowerId = e.dataTransfer.getData("flower");
        if (flowerId) assignFlower(flowerId);
      }, [assignFlower]);

      const loadProposal = useCallback((proposal) => {
        const newAssignments = { aisle:[], altar:[], tables:[], bouquet:[], boutonniere:[], bar:[] };
        Object.entries(proposal.elements).forEach(([tabId, el]) => {
          newAssignments[tabId] = el.flowerIds || [];
        });
        const allColors = Object.values(proposal.elements).flatMap(el => el.colors);
        setActiveMix([...new Set(allColors)]);
        setAssignments(newAssignments);
      }, []);

      const currentTab = TABS.find(t=>t.id===activeTab);

      return (
        <div className="min-h-screen" style={{background:"linear-gradient(180deg, #FAF7F2 0%, #F5F0E8 100%)", fontFamily:"'Inter','system-ui',sans-serif"}}>

          {/* ── TOP NAV ── */}
          <nav className="sticky top-0 z-40 backdrop-blur-md border-b border-stone-200/60" style={{background:"rgba(250,247,242,0.92)"}}>
            <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-full flex items-center justify-center text-lg" style={{background:"linear-gradient(135deg,#F5C451,#E8825A)"}}>☀️</div>
                <div>
                  <h1 className="font-bold text-stone-800 text-sm sm:text-base">Solar Rhythm Planner</h1>
                  <p className="text-xs text-stone-400">Terre Ugo · June 2026</p>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={()=>setSidebar(!sidebar)} className="sm:hidden text-stone-500 px-2 py-1 rounded-lg hover:bg-stone-100 text-sm">
                  {sidebar ? "✕" : "☰"}
                </button>
                <button
                  onClick={()=>setShowProposals(!showProposals)}
                  className="px-3 py-2 rounded-xl text-xs sm:text-sm font-semibold text-white transition-all hover:scale-105"
                  style={{background:"linear-gradient(135deg,#F5C451,#E8825A)"}}
                >
                  {showProposals ? "Back to Planner" : "3 Ready Proposals"}
                </button>
              </div>
            </div>
          </nav>

          {exportProposal && <ExportPanel proposal={exportProposal} onClose={()=>setExportProposal(null)}/>}

          {/* ── PROPOSALS VIEW ── */}
          {showProposals ? (
            <div className="max-w-7xl mx-auto px-4 py-6">
              <div className="mb-6 text-center">
                <h2 className="text-2xl font-bold text-stone-800 mb-1">3 Ready-to-Show Proposals</h2>
                <p className="text-stone-500 text-sm">Based on your exact preferences + Sophie's quote (1435€)</p>
              </div>
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                {PROPOSALS.map(p => (
                  <div key={p.id}>
                    <ProposalView proposal={p}/>
                    <div className="flex gap-2 mt-3">
                      <button
                        onClick={()=>{ loadProposal(p); setShowProposals(false); }}
                        className="flex-1 py-2 rounded-xl text-sm font-semibold text-stone-700 bg-white border-2 border-stone-200 hover:border-amber-400 transition-all"
                      >
                        Load in Planner
                      </button>
                      <button
                        onClick={()=>setExportProposal(p)}
                        className="flex-1 py-2 rounded-xl text-sm font-semibold text-white transition-all hover:opacity-90"
                        style={{background:"linear-gradient(135deg,#7B68AE,#B0A0C8)"}}
                      >
                        Export
                      </button>
                    </div>
                  </div>
                ))}
              </div>
              {/* Sophie Quote Summary */}
              <div className="mt-8 max-w-xl mx-auto bg-white rounded-2xl border-2 border-stone-200 p-5">
                <h3 className="font-bold text-stone-800 mb-3">Devis Sophie — Fleurissons vos émotions</h3>
                <div className="space-y-1 text-sm text-stone-600">
                  <div className="flex justify-between"><span>Bouquet mariée + à jeter + clématites</span><span className="font-semibold">135€</span></div>
                  <div className="flex justify-between"><span>Boutonnière jaune</span><span className="font-semibold">10€</span></div>
                  <div className="flex justify-between"><span>Allée cérémonie (6×75€)</span><span className="font-semibold">450€</span></div>
                  <div className="flex justify-between"><span>Tables dîner (12×45€)</span><span className="font-semibold">540€</span></div>
                  <div className="flex justify-between"><span>Installation + désinstallation</span><span className="font-semibold">300€</span></div>
                  <div className="flex justify-between border-t border-stone-200 pt-2 mt-2 text-base"><span className="font-bold">Total</span><span className="font-bold text-amber-600">1 435€</span></div>
                </div>
                <div className="mt-3 text-xs text-stone-400">
                  Acompte 717,50€ avant 1er avril · Solde 717,50€ avant 1er juin
                </div>
              </div>
            </div>
          ) : (

          /* ── PLANNER VIEW ── */
          <div className="max-w-7xl mx-auto flex" style={{minHeight:"calc(100vh - 56px)"}}>

            {/* ── LEFT SIDEBAR ── */}
            <aside className={`${sidebar ? 'block' : 'hidden'} sm:block w-72 flex-shrink-0 border-r border-stone-200/60 p-4 overflow-y-auto`} style={{maxHeight:"calc(100vh - 56px)"}}>

              <div className="mb-5">
                <h2 className="font-bold text-stone-700 text-sm mb-2 flex items-center gap-1">Extracted Palettes</h2>
                <div className="flex flex-wrap gap-1">
                  {PALETTE.map(c => (
                    <Swatch key={c.id} hex={c.hex} size={32} name={c.name}
                      onClick={()=>toggleColor(c.hex)} selected={activeMix.includes(c.hex)}/>
                  ))}
                </div>
                {activeMix.length > 0 && (
                  <div className="mt-2">
                    <div className="text-xs text-stone-400 mb-1">Active Mix ({activeMix.length})</div>
                    <div className="flex gap-0.5 h-6 rounded-full overflow-hidden border border-stone-200">
                      {activeMix.map((c,i) => <div key={i} style={{background:c, flex:1}}/>)}
                    </div>
                  </div>
                )}
              </div>

              <div className="mb-5">
                <h2 className="font-bold text-stone-700 text-sm mb-1 flex items-center gap-1">Flower Library</h2>
                <p className="text-xs text-stone-400 mb-2">Click or drag onto a tab</p>
                <div className="space-y-2">
                  {FLOWERS.map(f => (
                    <FlowerCard key={f.id} flower={f} onDrag={assignFlower}
                      assigned={(assignments[activeTab]||[]).includes(f.id)}/>
                  ))}
                </div>
              </div>

              <div className="mb-4">
                <h2 className="font-bold text-stone-700 text-sm mb-2">Toggles</h2>
                <div className="space-y-2">
                  <label className="flex items-center gap-2 text-xs text-stone-600 cursor-pointer">
                    <input type="checkbox" checked={tropical} onChange={()=>setTropical(!tropical)} className="rounded accent-amber-500"/>
                    Add subtle tropical touch
                  </label>
                  <label className="flex items-center gap-2 text-xs text-stone-600 cursor-pointer">
                    <input type="checkbox" checked={provencal} onChange={()=>setProvencal(!provencal)} className="rounded accent-amber-500"/>
                    Keep Provençal chic
                  </label>
                  <label className="flex items-center gap-2 text-xs text-stone-600 cursor-pointer">
                    <input type="checkbox" checked={true} disabled className="rounded accent-red-500"/>
                    <span className="text-red-500">Avoid boho / rococo / pastel</span>
                  </label>
                </div>
              </div>

              <div>
                <h2 className="font-bold text-stone-700 text-sm mb-1">Vibe</h2>
                <div className="flex flex-wrap gap-1">
                  {VIBE_KEYWORDS.map(v => (
                    <span key={v} className="text-xs px-2 py-1 rounded-full bg-stone-100 text-stone-500">{v}</span>
                  ))}
                </div>
              </div>
            </aside>

            {/* ── MAIN AREA ── */}
            <main className="flex-1 min-w-0">

              {/* Tab bar */}
              <div className="flex overflow-x-auto border-b border-stone-200/60 px-2">
                {TABS.map(tab => (
                  <button
                    key={tab.id}
                    onClick={()=>{ setActiveTab(tab.id); setFullView(false); }}
                    className={`flex items-center gap-1.5 px-4 py-3 text-sm whitespace-nowrap border-b-2 transition-all ${
                      activeTab === tab.id && !fullView
                        ? 'border-amber-500 text-stone-800 font-semibold'
                        : 'border-transparent text-stone-400 hover:text-stone-600'
                    }`}
                  >
                    <span>{tab.icon}</span>
                    <span className="hidden sm:inline">{tab.label}</span>
                  </button>
                ))}
                <button
                  onClick={()=>setFullView(!fullView)}
                  className={`flex items-center gap-1.5 px-4 py-3 text-sm whitespace-nowrap border-b-2 transition-all ml-auto ${
                    fullView ? 'border-purple-500 text-stone-800 font-semibold' : 'border-transparent text-stone-400 hover:text-stone-600'
                  }`}
                >
                  <span className="hidden sm:inline">Full Wedding View</span>
                  <span className="sm:hidden">All</span>
                </button>
              </div>

              {/* Content area */}
              <div className="p-4 sm:p-6">

                {fullView ? (
                  /* Full Wedding View */
                  <div className="space-y-4">
                    <h2 className="text-xl font-bold text-stone-800 mb-2">Full Wedding View</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {TABS.map(tab => (
                        <div key={tab.id}>
                          <Preview tab={tab} assignments={assignments} activeMix={activeMix}/>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  /* Single tab view */
                  <div
                    onDragOver={(e)=>{e.preventDefault(); e.dataTransfer.dropEffect="copy";}}
                    onDrop={handleDrop}
                  >
                    {/* Bouquet special controls */}
                    {activeTab === "bouquet" && (
                      <div className="bg-white rounded-xl border border-stone-200 p-4 mb-4">
                        <h3 className="font-semibold text-stone-700 text-sm mb-2">Bouquet Rules</h3>
                        <div className="flex flex-wrap gap-4">
                          <label className="flex items-center gap-2 text-sm text-stone-600 cursor-pointer">
                            <input type="checkbox" checked={singleFlower} onChange={()=>setSingleFlower(!singleFlower)} className="accent-amber-500"/>
                            Single flower type only
                          </label>
                          <label className="flex items-center gap-2 text-sm text-stone-600 cursor-pointer">
                            <input type="checkbox" checked={monochrome} onChange={()=>setMonochrome(!monochrome)} className="accent-amber-500"/>
                            Monochrome (white)
                          </label>
                        </div>
                        <p className="text-xs text-stone-400 mt-2">Ruban mousseline de soie blanc · Pas de feuillage · Ajouter clématites trailing</p>
                      </div>
                    )}

                    {/* Boutonnière auto-suggest */}
                    {activeTab === "boutonniere" && (
                      <div className="bg-blue-50 rounded-xl border border-blue-200 p-4 mb-4">
                        <h3 className="font-semibold text-stone-700 text-sm mb-1">Auto-suggestion: Petrol Blue Contrast</h3>
                        <p className="text-xs text-stone-500 mb-2">Le costume est bleu pétrole — jaune totalement (note Sophie). Options qui matchent :</p>
                        <div className="flex gap-2 flex-wrap">
                          {["craspedia","achillea","ranunculus"].map(fId => {
                            const f = FLOWERS.find(fl=>fl.id===fId);
                            return f ? (
                              <button key={fId} onClick={()=>assignFlower(fId)}
                                className={`flex items-center gap-2 px-3 py-2 rounded-lg text-xs border transition-all ${
                                  (assignments.boutonniere||[]).includes(fId) ? 'bg-amber-100 border-amber-400 font-semibold' : 'bg-white border-stone-200 hover:border-amber-300'
                                }`}>
                                <FlowerImg flowerId={fId} size={28}/>
                                {f.name}
                              </button>
                            ) : null;
                          })}
                        </div>
                      </div>
                    )}

                    {/* Assigned flowers */}
                    {(assignments[activeTab]||[]).length > 0 && (
                      <div className="mb-4">
                        <div className="text-xs text-stone-400 mb-1">Assigned flowers (click to remove):</div>
                        <div className="flex flex-wrap gap-2">
                          {(assignments[activeTab]||[]).map((fId,i) => {
                            const f = FLOWERS.find(fl=>fl.id===fId);
                            return f ? (
                              <button key={`${fId}-${i}`} onClick={()=>assignFlower(fId)}
                                className="flex items-center gap-2 px-2.5 py-1.5 rounded-lg text-xs bg-amber-50 border border-amber-300 hover:bg-red-50 hover:border-red-300 transition-all">
                                <FlowerImg flowerId={fId} size={24}/>
                                {f.name} ✕
                              </button>
                            ) : null;
                          })}
                        </div>
                      </div>
                    )}

                    <Preview tab={currentTab} assignments={assignments} activeMix={activeMix}/>
                  </div>
                )}
              </div>
            </main>
          </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SolarRhythmFloralPlanner));
  </script>
</body>
</html>
